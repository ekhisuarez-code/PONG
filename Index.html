<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pong Pro - Versión Final Corregida</title>
    <style>
        :root { --neon: #00ffcc; --p2-color: #ff3366; --bg: #0a0a0c; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* Capas de Interfaz */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .hidden { display: none !important; }
        
        /* Controles de Puntos */
        .score-selector {
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px;
        }
        .score-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon);
            background: transparent; color: white; font-size: 1.5rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #scoreLimitDisplay { font-size: 2.2rem; font-weight: bold; width: 60px; text-align: center; }

        /* Botones Generales */
        .btn-group { display: flex; gap: 15px; flex-direction: column; }
        button {
            background: transparent; border: 2px solid white; color: white;
            padding: 14px 30px; font-size: 1.1rem; cursor: pointer; border-radius: 8px;
            transition: 0.2s; min-width: 280px; text-transform: uppercase; font-weight: bold;
        }
        button:hover { background: white; color: black; box-shadow: 0 0 20px white; }

        /* Juego */
        canvas { border: 2px solid #333; background: #000; display: block; }
        .blur { filter: blur(15px); }
        h1 { font-size: 4rem; margin: 0 0 20px 0; text-shadow: 0 0 20px var(--neon); letter-spacing: 5px; }
        .win-text { font-size: 3.5rem; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="mainMenu" class="overlay">
        <h1>PONG</h1>
        <p style="letter-spacing: 2px; opacity: 0.7;">PUNTOS PARA GANAR</p>
        <div class="score-selector">
            <button class="score-btn" onclick="changeLimit(-1)">-</button>
            <div id="scoreLimitDisplay">10</div>
            <button class="score-btn" onclick="changeLimit(1)">+</button>
        </div>
        <div class="btn-group">
            <button onclick="showDifficulty()">MODO CLÁSICO (1 JUGADOR)</button>
            <button onclick="startMultiplayer()">2 JUGADORES (LOCAL)</button>
        </div>
    </div>

    <div id="diffMenu" class="overlay hidden">
        <h1>DIFICULTAD</h1>
        <div class="btn-group">
            <button onclick="startClassic(0.06, 6)">FÁCIL</button>
            <button onclick="startClassic(0.11, 8)">MEDIO</button>
            <button onclick="startClassic(0.18, 11)">DIFÍCIL</button>
            <button onclick="startClassic(0.4, 15)" style="color:var(--p2-color); border-color:var(--p2-color);">IMPOSIBLE</button>
            <button onclick="goToHome()" style="border:none; text-decoration: underline; font-size: 0.9rem;">ATRÁS</button>
        </div>
    </div>

    <div id="pauseMenu" class="overlay hidden">
        <h1>PAUSA</h1>
        <div class="btn-group">
            <button onclick="resumeGame()" style="border-color: var(--neon); color: var(--neon);">REANUDAR</button>
            <p style="font-size: 0.9rem; color: #666; margin-top: 20px; text-align: center;">PULSA [ESC] PARA VOLVER AL MENÚ PRINCIPAL</p>
        </div>
    </div>

    <div id="winMenu" class="overlay hidden">
        <h1 id="winMessage" class="win-text">¡GANA P1!</h1>
        <button onclick="goToHome()">VOLVER AL MENÚ PRINCIPAL</button>
    </div>

    <canvas id="pongCanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");

    // Variables de Estado
    let gameRunning = false;
    let isPaused = false;
    let mode = "pvc"; 
    let cpuLevel = 0.1;
    let ballBaseSpeed = 7;
    let scoreLimit = 10;

    // Objetos
    let p1 = { x: 10, y: 200, w: 12, h: 90, score: 0, color: "#00ffcc" };
    let p2 = { x: 778, y: 200, w: 12, h: 90, score: 0, color: "#ff3366" };
    let ball = { x: 400, y: 250, r: 8, dx: 0, dy: 0, speed: 7 };

    const keys = {};
    window.addEventListener("keydown", e => {
        keys[e.code] = true;
        // Tecla de Pausa o Salida
        if (e.code === "Escape" || e.code === "KeyP") {
            if (gameRunning && !isPaused) {
                pauseGame();
            } else if (isPaused && e.code === "Escape") {
                goToHome();
            } else if (isPaused) {
                resumeGame();
            }
        }
    });
    window.addEventListener("keyup", e => keys[e.code] = false);

    // --- NAVEGACIÓN ---
    function changeLimit(val) {
        scoreLimit = Math.max(1, Math.min(50, scoreLimit + val));
        document.getElementById("scoreLimitDisplay").innerText = scoreLimit;
    }

    function showDifficulty() {
        document.getElementById("mainMenu").classList.add("hidden");
        document.getElementById("diffMenu").classList.remove("hidden");
    }

    function goToHome() {
        gameRunning = false;
        isPaused = false;
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById("mainMenu").classList.remove("hidden");
        canvas.classList.remove("blur");
    }

    function startMultiplayer() { mode = "pvp"; initGame(); }
    function startClassic(level, speed) { mode = "pvc"; cpuLevel = level; ballBaseSpeed = speed; initGame(); }

    function initGame() {
        document.querySelectorAll(".overlay").forEach(el => el.classList.add("hidden"));
        p1.score = 0; p2.score = 0;
        p1.y = canvas.height/2 - p1.h/2;
        p2.y = canvas.height/2 - p2.h/2;
        resetBall();
        gameRunning = true;
        isPaused = false;
        canvas.classList.remove("blur");
    }

    function pauseGame() {
        isPaused = true;
        canvas.classList.add("blur");
        document.getElementById("pauseMenu").classList.remove("hidden");
    }

    function resumeGame() {
        isPaused = false;
        canvas.classList.remove("blur");
        document.getElementById("pauseMenu").classList.add("hidden");
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        ball.speed = ballBaseSpeed;
        ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
        ball.dy = (Math.random() - 0.5) * ball.speed;
    }

    // --- LÓGICA CORE ---
    function update() {
        if (!gameRunning || isPaused) return;

        // Movimiento Jugadores
        if (keys["KeyW"] && p1.y > 0) p1.y -= 10;
        if (keys["KeyS"] && p1.y < canvas.height - p1.h) p1.y += 10;

        if (mode === "pvp") {
            if (keys["ArrowUp"] && p2.y > 0) p2.y -= 10;
            if (keys["ArrowDown"] && p2.y < canvas.height - p2.h) p2.y += 10;
        } else {
            let targetY = ball.y - p2.h / 2;
            p2.y += (targetY - p2.y) * cpuLevel;
        }

        // Movimiento Pelota
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Rebote Paredes
        if (ball.y + ball.r > canvas.height || ball.y - ball.r < 0) ball.dy *= -1;

        // Rebote Paletas
        let player = (ball.x < canvas.width / 2) ? p1 : p2;
        if (ball.x + ball.r > player.x && ball.x - ball.r < player.x + player.w &&
            ball.y + ball.r > player.y && ball.y - ball.r < player.y + player.h) {
            
            let collidePoint = (ball.y - (player.y + player.h/2)) / (player.h/2);
            let angle = collidePoint * (Math.PI/4);
            ball.dx = (ball.x < canvas.width/2 ? 1 : -1) * ball.speed * Math.cos(angle);
            ball.dy = ball.speed * Math.sin(angle);
            ball.speed += 0.4;
        }

        // Goles
        if (ball.x < 0) { p2.score++; checkWin(); }
        else if (ball.x > canvas.width) { p1.score++; checkWin(); }
    }

    function checkWin() {
        if (p1.score >= scoreLimit || p2.score >= scoreLimit) {
            gameRunning = false;
            canvas.classList.add("blur");
            const winMenu = document.getElementById("winMenu");
            const winMsg = document.getElementById("winMessage");
            winMenu.classList.remove("hidden");
            
            if (p1.score >= scoreLimit) {
                winMsg.innerText = "¡GANADOR: JUGADOR 1!";
                winMsg.style.color = p1.color;
            } else {
                winMsg.innerText = mode === "pvp" ? "¡GANADOR: JUGADOR 2!" : "¡GANÓ LA CPU!";
                winMsg.style.color = p2.color;
            }
        } else {
            resetBall();
        }
    }

    function draw() {
        // Limpiar
        ctx.fillStyle = "rgba(10,10,12,0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameRunning || isPaused) {
            // Estética
            ctx.shadowBlur = 15;
            ctx.fillStyle = p1.color; ctx.shadowColor = p1.color;
            ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
            ctx.fillStyle = p2.color; ctx.shadowColor = p2.color;
            ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
            ctx.fillStyle = "#fff"; ctx.shadowColor = "#fff";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Marcador gigante al fondo
            ctx.font = "bold 80px Arial"; ctx.globalAlpha = 0.1;
            ctx.textAlign = "center";
            ctx.fillText(p1.score, canvas.width/4, canvas.height/2 + 30);
            ctx.fillText(p2.score, 3*canvas.width/4, canvas.height/2 + 30);
            ctx.globalAlpha = 1;
        }
    }

    function mainLoop() {
        update();
        draw();
        requestAnimationFrame(mainLoop);
    }

    mainLoop();
</script>
</body>
</html>
